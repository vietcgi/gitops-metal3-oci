---
# Let's Encrypt Production ClusterIssuer
# DNS-01 (Cloudflare) handles wildcard certs and non-public origins;
# HTTP-01 (Gateway) handles per-host certs.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@qualityspace.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # DNS-01 required for wildcard certs. Uses the cloudflare-api-token secret
      # already provisioned in cert-manager namespace.
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "qualityspace.com"
            - "baohiemxe.com"
      # HTTP-01 fallback for non-wildcard, single-host certs.
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: ingress
                kind: Gateway
---
# Let's Encrypt Staging ClusterIssuer (for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@qualityspace.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "qualityspace.com"
            - "baohiemxe.com"
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: main-gateway
                namespace: ingress
                kind: Gateway
