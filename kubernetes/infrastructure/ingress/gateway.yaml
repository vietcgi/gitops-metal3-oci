---
# Namespace for shared ingress resources
apiVersion: v1
kind: Namespace
metadata:
  name: ingress
---
# NOTE: Certificate moved to infrastructure-config layer (requires cert-manager CRDs)
# See kubernetes/infrastructure-config/certificates.yaml
---
# Shared Gateway for all services
# Uses wildcard cert for all *.qualityspace.com subdomains
# hostNetwork via Cilium - binds directly to host ports 80/443
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: ingress
spec:
  gatewayClassName: cilium
  listeners:
    # HTTP listener - for HTTP→HTTPS redirects and iPXE
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener - wildcard cert covers all subdomains
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.qualityspace.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-qualityspace-tls
