apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Flux sources (HelmRepositories)
  - sources
  # Core infrastructure
  - sealed-secrets
  - cert-manager
  - local-path
  - ingress
  # Monitoring (depends on local-path storage)
  - monitoring
  # NOTE: Cilium is installed via setup-cluster.sh (CNI must exist before Flux)
  # The cilium/ directory contains a HelmRelease for reference/day-2 upgrades
  - cilium
  # Security
  - vault
  - gatekeeper
  - kyverno
  # Backup
  - backup
  # Registry
  - harbor
  # Bare metal provisioning (Metal3/Ironic)
  # NOTE: Disabled - Metal3/Ironic images are x86 only, not compatible with ARM control plane
  # TODO: Build multi-arch images or run Ironic on x86 workers
  # - metal3
