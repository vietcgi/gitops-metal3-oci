apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Upstream Rancher SUC: includes Namespace + ServiceAccount + RBAC + Deployment
  # Source: https://github.com/rancher/system-upgrade-controller/releases/latest
  - upstream/crd.yaml
  - upstream/controller.yaml
  # NOTE: plans/k3s-server.yaml is NOT in this kustomization. The Plan CRD is
  # in upstream/crd.yaml so it's available, BUT we leave the Plan out of the
  # automated Flux sync so it can be applied deliberately when ready
  # (k3s upgrade is a node-restart event).
