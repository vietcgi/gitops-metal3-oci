# HTTPRoute that wires baohiemxe.com / www.baohiemxe.com → baohiemxe Service.
# Attaches to the main-gateway listeners we added in gateway-listeners.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: baohiemxe-route
  namespace: baohiemxe
spec:
  parentRefs:
    - name: main-gateway
      namespace: ingress
      sectionName: https-baohiemxe
    - name: main-gateway
      namespace: ingress
      sectionName: https-baohiemxe-www
    - name: main-gateway
      namespace: ingress
      sectionName: http-baohiemxe
    - name: main-gateway
      namespace: ingress
      sectionName: http-baohiemxe-www
  hostnames:
    - baohiemxe.com
    - www.baohiemxe.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: baohiemxe
          port: 80
